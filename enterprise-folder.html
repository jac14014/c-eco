            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(13, 31, 13, 0.95); backdrop-filter: blur(10px);

            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }

            font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600;
            letter-spacing: 3px; color: var(--gold); white-space: nowrap;

        .viewport-controls .btn-group { display: flex; gap: 8px; }
        .viewport-controls button {
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
            padding: 6px 12px; border: 1px solid var(--border-gold); background: transparent;
            color: var(--gold); border-radius: 4px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .viewport-controls button:hover, .viewport-controls button.active {
            background: var(--gold); color: var(--forest-dark);
        }

        /* Brochure */
        .brochure-wrapper { padding-top: 55px; min-height: 100vh; }
        .brochure-container {
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; padding: 20px 15px 40px;
        }

        /* Page */
        .page {
            width: 210mm; height: 297mm; position: relative; overflow: hidden;
            background: var(--forest-dark); flex-shrink: 0;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);

            content: ''; position: absolute; inset: 0;

                radial-gradient(ellipse at 70% 80%, rgba(26, 51, 32, 0.6) 0%, transparent 50%);
            pointer-events: none; z-index: 1;
        }
        .corner-ornament {
            position: absolute; width: 40mm; height: 40mm; z-index: 2; pointer-events: none;
        }
        .corner-ornament.tl { top: 0; left: 0; border-top: 1px solid var(--border-gold); border-left: 1px solid var(--border-gold); }
        .corner-ornament.tr { top: 0; right: 0; border-top: 1px solid var(--border-gold); border-right: 1px solid var(--border-gold); }
        .corner-ornament.bl { bottom: 0; left: 0; border-bottom: 1px solid var(--border-gold); border-left: 1px solid var(--border-gold); }
        .corner-ornament.br { bottom: 0; right: 0; border-bottom: 1px solid var(--border-gold); border-right: 1px solid var(--border-gold); }
        .inner-frame { position: absolute; inset: 8mm; border: 0.5px solid var(--border-gold); z-index: 2; pointer-events: none; }
        .content {
            position: relative; z-index: 3; padding: 18mm 20mm; height: 100%;
            display: flex; flex-direction: column;
        }

        /* Typography */
        .brand { font-family: 'Cinzel', serif; font-size: 10pt; font-weight: 600; letter-spacing: 6px; text-transform: uppercase; color: var(--gold); }

        .headline-xl { font-family: 'Cinzel Decorative', serif; font-size: 28pt; font-weight: 400; line-height: 1.2; color: var(--gold-light); text-shadow: 0 2px 20px rgba(201, 168, 76, 0.2); }
        .headline-lg { font-family: 'Cinzel', serif; font-size: 18pt; font-weight: 500; line-height: 1.25; color: var(--gold-light); }

        .seal-placeholder {
            width: 50mm; height: 50mm; border: 1px solid var(--border-gold); border-radius: 50%;

            background: radial-gradient(circle, rgba(201, 168, 76, 0.1) 0%, transparent 70%);
        }

        .problem-card h4 { font-family: 'Cinzel', serif; font-size: 8pt; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-light); margin-bottom: 2mm; }

function setMode(mode){

btnFull.classList.remove('active');
}else{
container.classList.remove('fit-screen');

btnFull.classList.add('active');
btnFit.classList.remove('active');
}
}

});
