<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Offline — c-ECO Review Engine</title>
 <style>
 body {
 font-family: 'Inter', sans-serif;
 background: #1E1E1E;
 color: white;
 display: flex;
 align-items: center;
 justify-content: center;
 min-height: 100vh;
 margin: 0;
 text-align: center;
 }
 .offline-box {
 max-width: 400px;
 padding: 40px;
 }
 .offline-icon {
 font-size: 48px;
 margin-bottom: 20px;
 }
 h1 {
 font-family: 'Crimson Pro', serif;
 font-size: 24px;
 margin-bottom: 12px;
 }
 p {
 color: rgba(255,255,255,0.6);
 font-size: 14px;
 line-height: 1.6;
 }
 .retry-btn {
 margin-top: 24px;
 background: #A51C30;
 color: white;
 border: none;
 padding: 12px 24px;
 font-size: 14px;
 font-weight: 600;
 border-radius: 4px;
 cursor: pointer;
 }
 </style>
</head>
<body>
 <div class="offline-box">
 <div class="offline-icon">📡</div>
 <h1>You are offline</h1>
 <p>The c-ECO Structural Review Engine requires an internet connection to validate your analysis against the AI engine.</p>
 <p style="margin-top: 12px;">Your previous submissions are saved locally. They will sync when connection returns.</p>
 <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
 </div>
</body>
</html>
